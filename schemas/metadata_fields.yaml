# Rentry Metadata Schema
# Auto-generated by scrape_metadata_schema.py
# Source: https://rentry.co/metadata-how
# Generated: 2026-07-12
#
# 'default' values shown are Rentry's server-side defaults.
# They are NOT injected by this system. Omitting a field from
# metadata.yaml lets Rentry apply its own default automatically.
---
PAGE_TITLE:
  description: Appears on the tab for this page's window in the browser.
  default: Taken from page content.
  max_length: 60
  max_values: 1
  group: PAGE
PAGE_DESCRIPTION:
  description: Used by search engines and content snippets.
  default: Taken from page content.
  max_length: 160
  max_values: 1
  group: PAGE
PAGE_IMAGE:
  description: Used by search engines and content snippets. If we ever have internal page linking with previews, this is what will show.
  default: Taken from page content.
  max_length: 1000
  max_values: 1
  validate_one:
  - url
  group: PAGE
PAGE_ICON:
  description: Changes the icon that appears in the browser tab.
  default: The standard Rentry icon shown on all pages
  max_length: 1000
  max_values: 1
  validate_one:
  - url
  group: PAGE
SHARE_TITLE:
  description: Used by search engines and content snippets.
  default: The value in PAGE_TITLE
  max_length: 60
  max_values: 1
  group: SHARE
SHARE_DESCRIPTION:
  description: Used by search engines and content snippets. It's unlikely to be necessary to set this as well as PAGE_DESCRIPTION.
  default: The value in PAGE_DESCRIPTION
  max_length: 160
  max_values: 1
  group: SHARE
SHARE_IMAGE:
  description: Used by search engines and content snippets.
  default: The value in PAGE_IMAGE
  max_length: 1000
  max_values: 1
  validate_one:
  - url
  group: SHARE
SHARE_TWITTER_TITLE:
  description: Used by Twitter and other Twitter compatible platforms as the title snippet of the link.
  default: The value in SHARE_TITLE
  max_length: 60
  max_values: 1
  group: SHARE
SHARE_TWITTER_DESCRIPTION:
  description: Used by Twitter and other Twitter compatible platforms as the description snippet of the link.
  default: The value in SHARE_DESCRIPTION
  max_length: 160
  max_values: 1
  group: SHARE
SHARE_TWITTER_IMAGE:
  description: This image will be used for Twitter and other Twitter compatible platforms when loading a preview of this page.
  default: The value in SHARE_IMAGE
  max_length: 1000
  max_values: 1
  validate_one:
  - url
  group: SHARE
OPTION_DISABLE_VIEWS:
  description: Disables the view counter and hides it. Existing view count will return when this is unset.
  max_length: 5
  max_values: 1
  validate_all:
  - bool
  group: OPTION
OPTION_DISABLE_SEARCH_ENGINE:
  description: Removes the URL from the sitemap and instructs crawling search engines to not index it. Note that it can take up to 2 months for Google to remove listings.
  max_length: 5
  max_values: 1
  validate_all:
  - bool
  group: OPTION
OPTION_USE_ORIGINAL_PUB_DATE:
  description: If a URL was deleted and re-created this forces it to show the date it was first published, rather than date of re-activation.
  max_length: 5
  max_values: 1
  validate_all:
  - bool
  group: OPTION
ACCESS_RECOMMENDED_THEME:
  description: When a page does not look good in one of the viewing modes, this will auto switch the viewer to the listed mode.
  max_length: 5
  max_values: 1
  validate_all:
  - whitelisted_string
  permitted_values:
  - dark
  - light
  group: ACCESS
ACCESS_EASY_READ:
  description: Adds an e2r button next to the high contrast button that people can click on, which will link to the listed URL. Also, visiting /url/e2r will load the easy read version instead. While this is validated when saved, if the easy read version is removed afterwards, this setting will not update and the link will go to a 404.
  max_length: 300
  max_values: 1
  validate_all:
  - rentry_url
  - rentry_url_exists
  - rentry_url_enabled
  group: ACCESS
SECRET_VERIFY:
  description: Specify one or more external accounts that you can later use to recover your page if you forget the edit code.
  max_length: 3000
  max_values: 1
  group: SECRET
SECRET_RAW_ACCESS_CODE:
  description: A passcode that allows access to the raw version of this page, including through an automated script. You can also use this code as custom header rentry-auth, which will give access to the /raw/ version of any page. To get a code, please email [email protected].
  max_length: 100
  max_values: 1
  validate_all:
  - raw_access_code
  group: SECRET
SECRET_EMAIL_ADDRESS:
  description: Supply an email address to attach to this page, which we can then use to manually reset your edit code on request. In future updates this will be used for automated edit code resets.
  max_length: 300
  max_values: 1
  validate_all:
  - email
  group: SECRET
SAFETY_PAGE_WARNING:
  description: Adds a warning popup to your page before allowing visitors to view.
  max_length: 100
  max_values: 4
  validate_all:
  - whitelisted_string
  permitted_values:
  - adult
  - sensitive
  - epilepsy
  - custom
  group: SAFETY
SAFETY_PAGE_WARNING_DESCRIPTION:
  description: Provide your own text to the warning popup created by SAFETY_PAGE_WARNING
  max_length: 240
  max_values: 1
  group: SAFETY
SAFETY_MEDIA_BLUR:
  description: Blurs all images in your page and requires them to be clicked before showing. Allows you to display sensitive images that some viewers may prefer not to see
  max_length: 5
  max_values: 1
  validate_all:
  - bool
  group: SAFETY
SAFETY_LINK_WARNING:
  description: Triggers a popup when clicking on a link within your content. Users will then have the option to cancel and remain on your page.
  max_length: 100
  max_values: 3
  validate_all:
  - whitelisted_string
  permitted_values:
  - adult
  - epilepsy
  - sensitive
  group: SAFETY
SAFETY_LINK_WARNING_DESCRIPTION:
  description: Provide your own text to the link warning popup.
  max_length: 240
  max_values: 1
  group: SAFETY
SAFETY_PAGE_FLAG:
  description: Creates a visual icon on your page to inform readers that a page contains certain material. Similar to SAFETY_PAGE_WARNING, except it does not trigger a popup. This metadata is best used to tell Rentry about the content, allowing automatic filtering based on a visitor's country or a user's preference.
  max_length: 100
  max_values: 3
  validate_all:
