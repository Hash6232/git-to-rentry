CONTENT_FONT:
  description: 'Sets the font for the page content. Any font listed on Google fonts is permitted. Copy the font name from the title on the Google fonts page and if there are any spaces, switch them for underscores. For example: Comic Neue becomes Comic_Neue.'
  max_length: 1000
  max_values: 2
  validate_all:
  - font_name
  value_mapping:
  - Font for all content
  - Paragraph Headings
  reference: https://fonts.google.com/
  group: CONTENT
CONTENT_FONT_WEIGHT:
  description: Sets the font weight (boldness) for the page content. If you use multiple fonts, this will apply to them in the same order. If a weight is not available from Google then your browser will try to adjust the weight itself, which may look odd!
  max_length: 24
  max_values: 2
  validate_all:
  - whitelisted_string
  permitted_values:
  - bold
  - bolder
  - lighter
  - normal
  - '100'
  - '200'
  - '300'
  - '400'
  - '500'
  - '600'
  - '700'
  - '800'
  - '900'
  value_mapping:
  - Font for all content
  - Paragraph Headings
  group: CONTENT
CONTENT_TEXT_DIRECTION:
  description: Setting to rtl switches the text mode to right to left, which is recommended if using a right to left language such as Arabic. If you use this with a left to right language like English it will cause odd behaviour, such as punctuation appearing at the beginning of a line.
  max_length: 7
  max_values: 1
  validate_all:
  - whitelisted_string
  permitted_values:
  - ltr
  - rtl
  group: CONTENT
CONTENT_TEXT_SIZE:
  description: Sets the font size, either for the whole page, or for separate types of content depending on how many Values you supply. The first Value, base, sets the root font size of the page, which you can then make use of by setting other Values as relative. It is recommended to set the base as 16px and to use rem for all other values. This will mean that you can then adjust all font sizes by changing only the base value. For example, you set the base as 16px, Heading1 as 2.5rem and Paragraph as 1rem. This then outputs Heading1 as 2.5x16=40px and Paragraph as 16x1 = 16px. Later, you decide you want to font to be larger. So you change the base to 20px. Now, Heading1 will be 2.5x20=50px and Paragraph will be 20x1=20px If you have all Values set, this will make it much easier to control!
  default: 16px 1rem 2.5rem 2rem 1.75rem 1.5rem 1.25rem 1rem 1rem 1rem 1rem 14px
  max_length: 128
  max_values: 12
  validate_all:
  - css_size
  units:
    no-unit:
      min: 0
      max: 0
      decimals: 0
    px:
      min: 8
      max: 64
      decimals: 0
    '%':
      min: 10
      max: 500
      decimals: 3
    vh:
      min: 2
      max: 10
      decimals: 4
    hw:
      min: 2
      max: 10
      decimals: 4
    rem:
      min: 0.3
      max: 8
      decimals: 4
  value_list:
  - Base
  - Paragraphs
  - '# Header 1'
  - '## Header 2'
  - '### Header 3'
  - '#### Header 4'
  - '##### Header 5'
  - '###### Header 6'
  - List item
  - Link
  - Quotes
  - Code
  group: CONTENT
CONTENT_TEXT_ALIGN:
  description: Sets how text sits on the page, especially when there are multiple lines. Justify makes every line in a block of text take up the same width.
  default: left
  max_length: 7
  max_values: 1
  validate_all:
  - whitelisted_string
  permitted_values:
  - right
  - center
  - justify
  group: CONTENT
CONTENT_TEXT_SHADOW_COLOR:
  description: Sets the color of text shadow.
  max_length: 32
  max_values: 1
  validate_one:
  - color_name
  - color_hex
  - color_rgba
  requires:
  - CONTENT_TEXT_SHADOW_OFFSET
  group: CONTENT
CONTENT_TEXT_SHADOW_OFFSET:
  description: Sets the offset of text shadow.
  max_length: 32
  max_values: 2
  validate_all:
  - css_size
  requires:
  - CONTENT_TEXT_SHADOW_COLOR
  value_mapping:
  - Offset-X+Offset-Y
  - Offset-X Offset-Y
  group: CONTENT
CONTENT_TEXT_SHADOW_BLUR:
  description: Sets the blur of text shadow.
  max_length: 12
  max_values: 1
  validate_all:
  - css_size
  requires:
  - CONTENT_TEXT_SHADOW_COLOR
  - CONTENT_TEXT_SHADOW_OFFSET
  units:
    px:
      min: 0
      max: 30
      decimals: 0
    '%':
      min: 0
      max: 10
      decimals: 3
    vh:
      min: 0
      max: 5
      decimals: 4
    hw:
      min: 0
      max: 5
      decimals: 4
    rem:
      min: 0
      max: 3
      decimals: 4
  group: CONTENT
CONTENT_TEXT_COLOR:
  description: Sets the base text color. Inline text colors will override this.
  max_length: 128
  max_values: 2
  validate_one:
  - color_name
  - color_hex
  - color_rgba
  value_mapping:
  - All Modes
  - Light Dark
  group: CONTENT
CONTENT_LINK_COLOR:
  description: Sets the base link color.
  max_length: 16
  max_values: 2
  validate_one:
  - color_name
  - color_hex
  - color_rgba
  value_mapping:
  - All Modes
  - Light Dark
  group: CONTENT
CONTENT_BULLET_COLOR:
  description: Sets the bullet color for lists.
  max_length: 64
  max_values: 2
  validate_one:
  - color_name
  - color_hex
  - color_rgba
  value_mapping:
  - All Modes
  - Light Dark
  group: CONTENT
CONTENT_LINK_BEHAVIOR:
  description: Sets whether links load in new pages, or on the same page. Internal links are Rentry URLs, external links are anything else.
  default: same new
  max_length: 32
  max_values: 2
  validate_all:
  - whitelisted_string
  permitted_values:
  - same
  - new
  value_mapping:
  - All Links
  - Internal External
  group: CONTENT
