CONTAINER_INNER_FOREGROUND_COLOR:
  description: 'Sets the color of the inner foreground, which is best used as a semi transparent layer on top of the content. Giving a non transparent color here will block out all content. Recommended usage: set a color with around 0.2 transparency, which will give a slight tint to all content.'
  default: none
  max_length: 32
  max_values: 2
  validate_one:
