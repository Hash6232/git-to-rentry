# Example theme — clean, readable, dark-mode friendly
#
# Page metadata overrides these values. To use:
#   pages/<name>/metadata.conf -> theme = example
#
# Copy this file to themes/<your-theme>.conf and customize.

ACCESS_RECOMMENDED_THEME = dark
CONTAINER_MAX_WIDTH = 900px
CONTAINER_PADDING = 20px
CONTAINER_BORDER_RADIUS = 8px
CONTENT_TEXT_ALIGN = justify
