name: Publish to Rentry

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check for pages
        id: check-pages
        run: |
          if ls pages/*/metadata.yaml 2>/dev/null; then
            echo "has_pages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pages=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish pages
        if: steps.check-pages.outputs.has_pages == 'true'
        # env:
        #   BLOG_EDIT_CODE: ${{ secrets.BLOG_EDIT_CODE }}
        #   ABOUT_EDIT_CODE: ${{ secrets.ABOUT_EDIT_CODE }}
        run: python src/publish_rentry.py
